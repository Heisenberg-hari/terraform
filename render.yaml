services:
  - type: web
    name: terraform-backend
    env: python
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt
      cd backend
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: cd backend && python -m daphne -b 0.0.0.0 -p $PORT terraform_project.asgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: terraform-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: terraform-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://terraform-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://terraform-frontend.onrender.com,https://terraform-backend.onrender.com"

  - type: redis
    name: terraform-redis
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: terraform-frontend
    env: static
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: "https://terraform-backend.onrender.com"

databases:
  - name: terraform-postgres
    plan: free
